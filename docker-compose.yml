services:
  postgres:
    image: postgres:16-alpine
    container_name: buna_bingo_db
    environment:
      POSTGRES_USER: buna
      POSTGRES_PASSWORD: bingo2024
      POSTGRES_DB: buna_bingo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: buna_bingo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bunabingo.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
